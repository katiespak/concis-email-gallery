<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Concis Labs — email templates</title>
<style>
  :root{
    --canvas:#053330; --band:#0a4a44; --card:#063e3a;
    --line:rgba(126,239,230,0.2); --mint:#7eefe6; --lime:#ccff00;
    --ink:#eaf5f3; --muted:#c3deda; --dim:#8fb6b1;
    --scale:0.52; --frameH:560px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--canvas); color:var(--ink);
    font-family:'Switzer',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    position:sticky; top:0; z-index:10; background:rgba(5,51,48,0.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:18px 28px; display:flex; align-items:center; gap:22px; flex-wrap:wrap;
  }
  h1{margin:0; font-size:17px; font-weight:500; letter-spacing:-0.2px;}
  .count{color:var(--dim); font-size:13px; font-weight:400;}
  .zoom{margin-left:auto; display:flex; align-items:center; gap:10px; font-size:12px; color:var(--dim);}
  .zoom input{width:150px; accent-color:var(--mint);}
  .grid{
    display:grid; gap:26px; padding:28px;
    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  }
  .item{
    background:var(--card); border:1px solid var(--line);
    border-radius:14px; overflow:hidden; display:flex; flex-direction:column;
  }
  .meta{padding:15px 17px 13px; border-bottom:1px solid var(--line);}
  .row{display:flex; align-items:center; gap:9px; margin-bottom:5px; flex-wrap:wrap;}
  .name{font-size:15px; font-weight:500; letter-spacing:-0.2px;}
  .tag{
    font-size:9.5px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:999px; white-space:nowrap;
  }
  .tag.broadcast{background:var(--mint); color:#063e3a;}
  .tag.transactional{background:var(--lime); color:#063e3a;}
  .note{font-size:12px; color:var(--muted); margin-top:6px; line-height:17px;}
  .viewport{position:relative; height:var(--frameH); background:#053330; overflow:hidden;}
  .viewport iframe{
    width:600px; height:calc(var(--frameH) / var(--scale));
    border:0; transform:scale(var(--scale)); transform-origin:top left;
    position:absolute; top:0; left:50%;
    margin-left:calc(-300px * var(--scale));
    pointer-events:none;
  }
  .fade{
    position:absolute; left:0; right:0; bottom:0; height:70px; pointer-events:none;
    background:linear-gradient(to bottom,rgba(6,62,58,0),rgba(6,62,58,0.92));
  }
  .open{
    display:block; padding:11px 17px; font-size:12px; font-weight:600;
    letter-spacing:0.8px; text-transform:uppercase; text-decoration:none;
    color:var(--mint); border-top:1px solid var(--line); transition:background .12s;
  }
  .open:hover{background:rgba(126,239,230,0.07);}
  footer{padding:8px 28px 40px; color:var(--dim); font-size:12px; line-height:19px;}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>Concis Labs — email templates <span class="count">6 · 600px</span></h1>
  <label class="zoom">Zoom
    <input type="range" min="30" max="100" value="52" id="z" />
    <span id="zv">52%</span>
  </label>
</header>

<div class="grid" id="grid"></div>

<footer>
  Thumbnails are live renders, scrolled to the top and clipped &mdash; use <b>Open full</b> to see a whole email.
  Merge tags such as <code>{{{contact.first_name|there}}}</code> appear literally here; they resolve when sent.
</footer>

<script>
const TEMPLATES = [
  {n:'Welcome / Onboarding',   f:'r2/welcome.html', t:'broadcast', l:'Broadcast',
   d:'Cream card, illustration, three onboarding steps.'},
  {n:'Weekly Digest',          f:'r2/weekly-digest.html', t:'broadcast', l:'Broadcast',
   d:'Lime badge; cream state cards plus a peach "coming up" card.'},
  {n:'PA Criteria Update',     f:'r2/pa-criteria-update.html', t:'broadcast', l:'Broadcast',
   d:'Peach badge; dark card with dash bullets, then a key-takeaway card.'},
  {n:'Alert / Market Insight', f:'r2/alert-trigger.html', t:'broadcast', l:'Broadcast',
   d:'Mint badge; dark card, three dash-bulleted items.'},
  {n:'Feature Launch',         f:'r2/feature-launch.html', t:'broadcast', l:'Broadcast',
   d:'Cream card with three screenshot + heading + body sections.'},
  {n:'Lyndon \u2014 Roster Response', f:'lyndon/roster-response.html',
   t:'transactional', l:'Transactional',
   d:'Roster table, three columns, no unsubscribe. Sent in reply to a question.'},
];

document.getElementById('grid').innerHTML = TEMPLATES.map(t => `
  <div class="item">
    <div class="meta">
      <div class="row">
        <span class="name">${t.n}</span>
        <span class="tag ${t.t}">${t.l}</span>
      </div>
      <div class="note">${t.d}</div>
    </div>
    <div class="viewport">
      <iframe src="${t.f}" loading="lazy" title="${t.n}" scrolling="no"></iframe>
      <div class="fade"></div>
    </div>
    <a class="open" href="${t.f}" target="_blank" rel="noopener">Open full &#8599;</a>
  </div>
`).join('');

const z = document.getElementById('z'), zv = document.getElementById('zv');
z.addEventListener('input', () => {
  document.documentElement.style.setProperty('--scale', z.value / 100);
  zv.textContent = z.value + '%';
});
</script>
</body>
</html>
